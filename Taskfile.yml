version: '3'

dotenv: ['.env']

vars:
  PYTHON_DIR: priv/python

tasks:
  run:
    desc: Run the Phoenix web server in prod mode
    aliases: [prod]
    silent: true
    cmds:
      - echo "Building static assets..."
      - MIX_ENV=prod mix assets.deploy
      - echo "Running Lex server on localhost:4000..."
      - MIX_ENV=prod mix phx.server

  dev:
    desc: Run the Phoenix web server in dev mode
    silent: true
    cmds:
      - echo "Running Lex server in dev mode on localhost:4000..."
      - mix phx.server

  test:
    desc: Run all tests
    silent: true
    cmds:
      - echo "Running Python tests..."
      - uv run --directory {{.PYTHON_DIR}} pytest
      - echo ""
      - echo "Running Elixir tests..."
      - mix test

  reset-db:
    desc: Reset the database (drop, create, migrate)
    silent: true
    cmds:
      - echo "Resetting database..."
      - mix ecto.reset

  nlp-demo:
    desc: Run CLI demo with sample Spanish text (use TEXT="your text" to customize)
    aliases: [nlp]
    silent: true
    vars:
      TEXT: '{{.TEXT | default "El gato come pescado. ¿Te gusta el café?"}}'
    cmds:
      - uv run --directory {{.PYTHON_DIR}} python lex_nlp.py --text "{{.TEXT}}" --output /tmp/lex_demo.json && jq . /tmp/lex_demo.json
